<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERV – Indkaldelser af forslag</title>
<style>
:root{
  --beige:#FBF4ED;--beige-guide:#F8F0E2;--navy:#0F294A;--teal:#639FAB;
  --red:#C32032;--white:#FFFFFF;--navy-10:rgba(15,41,74,.10);--navy-20:rgba(15,41,74,.20);
  --maxw:1180px;--radius:14px;
  --font:"Segoe UI","Nunito Sans",-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);color:var(--navy);background:transparent;line-height:1.55;text-align:left;-webkit-font-smoothing:antialiased;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

/* Navy band in the DIHR holding shape (3 rounded corners + sharp bottom-left) */
.band{
  background:var(--navy);
  color:var(--white);
  border-radius:var(--radius) var(--radius) var(--radius) 0;
  padding:36px 0 40px;
  margin:24px 0;
}
.band .wrap{padding:0 32px;}

/* Header row: white heading + arrow controls (like the front-page news carousel) */
.band-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.band-head h2{color:var(--white);font-size:1.7rem;font-weight:700;margin:0;}
.controls{display:flex;gap:10px;}
.nav-btn{
  width:42px;height:42px;flex:0 0 auto;
  background:var(--red);border:none;cursor:pointer;
  border-radius:9px 9px 9px 0;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s ease,opacity .15s ease;
}
.nav-btn:hover{transform:translateY(-1px);}
.nav-btn:disabled{opacity:.4;cursor:default;transform:none;}
.nav-btn svg{width:18px;height:18px;color:#fff;}
.nav-btn:focus-visible{outline:3px solid var(--teal);outline-offset:2px;}

/* Scroller: 3 cards per view, 4th peeking. Scroll-snap for tidy paging. */
.scroller{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:calc((100% - 2*22px) / 3.25); /* 3 full + a peek of the next */
  gap:22px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  padding-bottom:6px;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.5) transparent;
}
.scroller::-webkit-scrollbar{height:8px;}
.scroller::-webkit-scrollbar-thumb{background:rgba(255,255,255,.45);border-radius:4px;}
.scroller::-webkit-scrollbar-track{background:rgba(255,255,255,.12);border-radius:4px;}

.cfp-card{
  scroll-snap-align:start;
  background:var(--white);border:1px solid var(--navy-10);
  border-radius:var(--radius) var(--radius) var(--radius) 0;
  padding:22px 22px 24px;display:flex;flex-direction:column;gap:8px;min-height:100%;
}
.cfp-status{align-self:flex-start;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 11px;border-radius:7px 7px 7px 0;}
.cfp-status.open{background:var(--teal);color:var(--navy);}
.cfp-status.forthcoming{background:var(--beige-guide);color:var(--navy);border:1px solid var(--navy-20);}
.cfp-code{font-size:.85rem;font-weight:700;color:#27425f;letter-spacing:.02em;}
.cfp-card h3{font-size:1.05rem;margin:2px 0 0;line-height:1.3;color:var(--navy);}
.cfp-card p.desc{font-size:.93rem;color:#27425f;margin:2px 0 0;}
.cfp-deadline{font-size:.9rem;color:var(--navy);margin-top:auto;padding-top:8px;}
.cfp-deadline b{font-weight:700;}

/* Footer button (red) + count */
.band-foot{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:26px;flex-wrap:wrap;}
.count{font-size:.85rem;color:rgba(255,255,255,.7);}
.btn{display:inline-flex;align-items:center;gap:9px;background:var(--red);color:var(--white);text-decoration:none;font-weight:700;font-size:1rem;padding:13px 22px;border-radius:9px 9px 9px 0;transition:transform .12s ease;}
.btn:hover{transform:translateY(-1px);}
.btn svg{width:16px;height:16px;}

@media(max-width:760px){
  .scroller{grid-auto-columns:88%;}
  .band-head h2{font-size:1.4rem;}
}
</style>
</head>
<body>
<section class="band">
  <div class="wrap">
    <div class="band-head">
      <h2>Call for proposals</h2>
      <div class="controls">
        <button class="nav-btn" id="prev" aria-label="Forrige indkaldelser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="nav-btn" id="next" aria-label="Flere indkaldelser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="scroller" id="scroller" tabindex="0" role="region" aria-label="CERV-indkaldelser, vandret liste"></div>

    <div class="band-foot">
      <span class="count" id="count"></span>
      <a class="btn" target="_blank" rel="noopener" href="https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/calls-for-proposals?isExactMatch=true&status=31094501,31094502&frameworkProgramme=43251589&order=DESC&pageNumber=1&pageSize=50&sortBy=startDate">
        Gå til ansøgningsportalen
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
      </a>
    </div>
  </div>
</section>

<script>
/* ===== DATA – EDIT HERE =================================================
   status: "open" (teal) | "forthcoming" (neutral beige)
   Sorted soonest-deadline first. Edit/add/remove freely.
   ----------------------------------------------------------------------- */
var CALLS=[
 {status:"open",code:"RIZA Call for proposals · Cascade funding",title:"Values Open Call for Proposals",desc:"Single-stage · åbnet 5. juni 2026.",deadline:"Frist: 31. juli 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/14602?isExactMatch=true&status=31094501,31094502&frameworkProgramme=43251589&order=DESC&pageNumber=1&pageSize=50&sortBy=startDate"},
  {status:"open",code:"BIRDS in BG - 2 · Cascade funding",title:"Values Open Call for Proposals",desc:"Single-stage · åbnet 6. april 2026.",deadline:"Frist: 8. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/13804?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"GROW · Cascade funding",title:"Call 1 – Financial Support to Third Parties focusing on the Right to Education",desc:"Multiple cut-off · åbnet 27. januar 2026.",deadline:"Næste frist: 15. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/13042?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"GROW · Cascade funding",title:"Call 2 – Financial Support to Third Parties focusing on the Right to Social Security, Assistance and Work",desc:"Multiple cut-off · åbnet 27. januar 2026.",deadline:"Næste frist: 15. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/13001?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"GROW · Cascade funding",title:"Call 3 – Financial Support to Third Parties focusing on Youth Democratic Participation",desc:"Multiple cut-off · åbnet 27. januar 2026.",deadline:"Næste frist: 15. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/13043?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV-2026-DATA",title:"Call for proposals to national data protection authorities on reaching out to stakeholders in data protection legislation",desc:"CERV Lump Sum Grants · single-stage.",deadline:"Frist: 25. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/CERV-2026-DATA?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"ERP_PL · Cascade funding",title:"Experience sharing grants",desc:"Multiple cut-off · åbnet 18. september 2025.",deadline:"Næste frist: 30. juni 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/11781?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV 2024 · Cascade funding",title:"Call No. 1 for proposals for NGOs to participate in capacity building and receive financial support",desc:"Multiple cut-off · åbnet 10. juni 2025.",deadline:"Næste frist: 14. juli 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/11142?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"PACT · Cascade funding",title:"Call for CSOs initiatives “Code Success” Fund",desc:"Multiple cut-off · åbnet 16. februar 2026.",deadline:"Næste frist: 3. august 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/13324?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"ERP_PL · Cascade funding",title:"Rapid Response Grants",desc:"Multiple cut-off · åbnet 18. september 2025.",deadline:"Næste frist: 15. august 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/11782?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV-2026-CHAR-LITI-CHARTER",title:"Raising awareness of and building capacity for the EU Charter of Fundamental Rights",desc:"CERV Project Grants · single-stage.",deadline:"Frist: 15. september 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/CERV-2026-CHAR-LITI-CHARTER?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV-2026-CHAR-LITI-CIVIC",title:"Promoting an enabling civic space",desc:"CERV Project Grants · single-stage.",deadline:"Frist: 15. september 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/CERV-2026-CHAR-LITI-CIVIC?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV-2026-CITIZENS-TOWN-TT",title:"Call Town Twinning 2026",desc:"CERV Lump Sum Grants · single-stage.",deadline:"Frist: 23. september 2026",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/topic-details/CERV-2026-CITIZENS-TOWN-TT?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"CERV 2024 · Cascade funding",title:"A running call No. 5 for bilateral cooperation project proposals",desc:"Single-stage · åbnet 17. december 2025.",deadline:"Frist: 1. februar 2027",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/12743?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"IMPACT4VALUES 2.0 · Cascade funding",title:"Call for proposal for support to Slovenian and Croatian SCOs to “Go out and vote!” campaigns",desc:"Multiple cut-off · åbnet 5. september 2025.",deadline:"Næste frist: 1. januar 2028",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/11674?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"},
  {status:"open",code:"BIRDS in BG - 2 · Cascade funding",title:"ReAction – Rapid Response Grants",desc:"Single-stage · åbnet 11. september 2025.",deadline:"Frist: 31. marts 2028",link:"https://ec.europa.eu/info/funding-tenders/opportunities/portal/screen/opportunities/competitive-calls-cs/11702?isExactMatch=true&status=31094502&frameworkProgramme=43251589&order=ASC&pageNumber=1&pageSize=50&sortBy=deadlineDate"}
];
/* ===== END DATA ========================================================= */

var esc=function(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
var label={open:"Åben for ansøgning",forthcoming:"Kommende"};

var scroller=document.getElementById('scroller');
scroller.innerHTML=CALLS.map(function(c){
  return '<article class="cfp-card">'+
    '<span class="cfp-status '+esc(c.status)+'">'+esc(label[c.status]||c.status)+'</span>'+
    '<span class="cfp-code">'+esc(c.code)+'</span>'+
    '<a href="'+esc(c.link)+'" target="_blank" rel="noopener" style="text-decoration:none;color:inherit"><h3>'+esc(c.title)+'</h3></a>'+
    (c.desc?'<p class="desc">'+esc(c.desc)+'</p>':'')+
    '<p class="cfp-deadline"><b>'+esc(c.deadline)+'</b></p>'+
  '</article>';
}).join('');

document.getElementById('count').textContent=CALLS.length+' åbne indkaldelser';

var prev=document.getElementById('prev'), next=document.getElementById('next');
function pageWidth(){
  var card=scroller.querySelector('.cfp-card');
  if(!card) return scroller.clientWidth;
  var gap=22;
  return (card.getBoundingClientRect().width+gap)*3;
}
function updateArrows(){
  var max=scroller.scrollWidth-scroller.clientWidth-2;
  prev.disabled = scroller.scrollLeft<=2;
  next.disabled = scroller.scrollLeft>=max;
}
prev.addEventListener('click',function(){scroller.scrollBy({left:-pageWidth(),behavior:'smooth'});});
next.addEventListener('click',function(){scroller.scrollBy({left:pageWidth(),behavior:'smooth'});});
scroller.addEventListener('scroll',updateArrows,{passive:true});
window.addEventListener('resize',function(){updateArrows();postHeight();});
updateArrows();

function postHeight(){
  var h=document.documentElement.scrollHeight;
  if(window.parent!==window){window.parent.postMessage({type:'cerv-resize',height:h},'*');}
}
window.addEventListener('load',postHeight);
new ResizeObserver(postHeight).observe(document.body);
</script>
</body>
</html>
