<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERV – Nyt fra projektet</title>
<style>
:root{
  --beige:#FBF4ED;
  --beige-guide:#F8F0E2;
  --navy:#0F294A;
  --teal:#639FAB;
  --red:#C32032;
  --white:#FFFFFF;
  --navy-10:rgba(15,41,74,.10);
  --navy-20:rgba(15,41,74,.20);
  --maxw:1180px;
  --radius:14px;
  --font:"Segoe UI","Nunito Sans",-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font);
  color:var(--navy);
  background:transparent;
  line-height:1.55;
  text-align:left;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}
.banner{padding:40px 0;}
img{display:block;max-width:100%;}
a{color:var(--navy);}
.banner-head{
  display:flex;align-items:baseline;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:24px;
}
h2{
  font-size:1.85rem;font-weight:700;margin-bottom:0;
  position:relative;padding-left:18px;
}
h2::before{
  content:"";position:absolute;left:0;top:.18em;bottom:.18em;
  width:6px;background:var(--teal);border-radius:3px 3px 3px 0;
}
h3{font-size:1.25rem;font-weight:700;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;}
@media(max-width:900px){.grid3{grid-template-columns:1fr;}}

.news-card{display:flex;flex-direction:column;text-decoration:none;color:inherit;}
.news-card .thumb{
  width:100%;aspect-ratio:16/10;object-fit:cover;
  border-radius:var(--radius) var(--radius) var(--radius) 0;background:var(--navy-10);
}
.news-icon{
  width:34px;height:34px;margin:-17px 0 10px 6px;background:var(--red);
  border-radius:7px 7px 7px 0;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
}
.news-icon svg{width:16px;height:16px;color:#fff;}
.news-card .kicker{font-size:.82rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.news-card h3{font-size:1.12rem;margin-bottom:8px;line-height:1.25;}
.news-card .blurb{font-size:.95rem;color:#27425f;margin:0;}
.news-card:hover h3{color:var(--red);}
</style>
</head>
<body>
<section class="banner">
  <div class="wrap">
    <div class="grid3" id="news-grid"></div>
  </div>
</section>
<script>
/* ===== DATA – EDIT HERE =====
   img: image URL (upload to Drupal media / repo). "" = navy placeholder
   link: article URL */
var NEWS=[
  {kicker:"Nyhed",title:"Instituttet går med i nyt CERV-projekt om rettighedsbaseret demokrati",blurb:"Kort beskrivelse af projektet og hvad det skal opnå. Redigér denne tekst, når artiklen er klar.",img:"",link:"#"},
  {kicker:"Nyhed",title:"Overskrift på anden projektartikel",blurb:"Et par linjers teaser, der giver læseren lyst til at klikke videre til den fulde artikel.",img:"",link:"#"},
  {kicker:"Nyhed",title:"Overskrift på tredje projektartikel",blurb:"Et par linjers teaser, der giver læseren lyst til at klikke videre til den fulde artikel.",img:"",link:"#"}
];
/* ===== END DATA ===== */
var esc=function(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});};
var arrowSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>';

document.getElementById('news-grid').innerHTML=NEWS.map(function(n){
  var thumb=n.img?'<img class="thumb" src="'+esc(n.img)+'" alt="">':'<div class="thumb"></div>';
  return '<a class="news-card" href="'+esc(n.link)+'">'+thumb+
    '<span class="news-icon">'+arrowSVG+'</span>'+
    '<span class="kicker">'+esc(n.kicker)+'</span>'+
    '<h3>'+esc(n.title)+'</h3>'+
    '<p class="blurb">'+esc(n.blurb)+'</p>'+
  '</a>';
}).join('');

/* link targeting: external -> new tab, in-page anchors -> same frame */
document.querySelectorAll('a[href]').forEach(function(a){
  var href=a.getAttribute('href');
  if(href && /^https?:\/\//i.test(href)){a.setAttribute('target','_blank');a.setAttribute('rel','noopener');}
  else if(href && href.charAt(0)==='#'){a.setAttribute('target','_self');}
});
/* postMessage auto-resize for the Drupal/parent page */
function postHeight(){
  var h=document.documentElement.scrollHeight;
  if(window.parent!==window){window.parent.postMessage({type:'cerv-resize',height:h},'*');}
}
window.addEventListener('load',postHeight);
window.addEventListener('resize',postHeight);
new ResizeObserver(postHeight).observe(document.body);

</script>
</body>
</html>
